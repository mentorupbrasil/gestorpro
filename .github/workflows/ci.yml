name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm types:supabase:check
      - run: pnpm security:secrets
      - run: pnpm audit --audit-level high
      - run: pnpm test
      - name: Scan destructive migrations
        run: node scripts/scan-destructive-migrations.mjs
      - name: Assert no operational ASO stub / E2E_EXAM billing
        run: |
          set -euo pipefail
          if grep -R -n "buildNonPhiDocumentStubPdf" src/features/documents/service.ts src/app; then
            echo "Operational ASO stub still referenced" >&2
            exit 1
          fi
          if grep -R -n "E2E_EXAM" src/app src/features; then
            echo "E2E_EXAM still used in operational code" >&2
            exit 1
          fi
          if grep -n "and not public.has_unit_permission(encounter_record.clinic_unit_id, 'encounters.manage')" supabase/migrations/202607160037_p0_strict_step_permissions.sql; then
            echo "encounters.manage fallback still present in 037" >&2
            exit 1
          fi
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  migrations-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migration sequence and SECURITY DEFINER guards
        run: |
          set -euo pipefail
          count=$(ls -1 supabase/migrations/*.sql | wc -l)
          test "$count" -ge 50
          echo "Found $count migrations"
          missing=0
          for file in supabase/migrations/*.sql; do
            if grep -qiE "create[[:space:]]+(or[[:space:]]+replace[[:space:]]+)?function" "$file" \
              && grep -qi "security definer" "$file"; then
              if ! grep -qi "set search_path" "$file"; then
                echo "Missing search_path in $file" >&2
                missing=1
              fi
            fi
          done
          test "$missing" -eq 0
          node scripts/scan-destructive-migrations.mjs
      - name: pgTAP specs present for bootstrap negatives
        run: |
          set -euo pipefail
          test -f supabase/tests/bootstrap_tenant_operations.sql
          grep -n "bootstrap does not self-grant\|draft clinical templates" supabase/tests/bootstrap_tenant_operations.sql
